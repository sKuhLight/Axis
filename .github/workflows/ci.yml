name: ci

# Axis consumes forgefx-server as a sibling workspace link (package.json:
# "forgefx-server": "file:../ForgeFX/server"), which in turn links forgefx-midi
# (file:../../forgefx-midi) — the Browser Direct runtime is bundled from source.
# So the job checks out all three repos side by side under the workspace and
# builds the linked packages first (their exports point at dist/).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: typecheck & build
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: 1 # web check/build doesn't need the Electron binary
    steps:
      - uses: actions/checkout@v5
        with:
          path: Axis
      - uses: actions/checkout@v5
        with:
          repository: sKuhLight/forgefx-midi
          path: forgefx-midi
      - uses: actions/checkout@v5
        with:
          repository: sKuhLight/ForgeFX
          path: ForgeFX
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            Axis/package-lock.json
            ForgeFX/server/package-lock.json
            forgefx-midi/package-lock.json
      - name: Build forgefx-midi (codec package)
        working-directory: forgefx-midi
        run: |
          npm ci
          npm run build
      - name: Build forgefx-server (runtime package)
        working-directory: ForgeFX/server
        run: |
          npm ci
          npm run build
      - name: Axis typecheck + build
        working-directory: Axis
        run: |
          npm ci
          npx svelte-kit sync
          npx svelte-check --tsconfig ./tsconfig.json
          npm run build
