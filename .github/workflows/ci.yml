name: ci

# Axis consumes forgefx-server as a sibling workspace link (package.json:
# "forgefx-server": "file:../ForgeFX/server"), which in turn links forgefx-midi
# (file:../../forgefx-midi) — the Browser Direct runtime is bundled from source.
# The shared ./Axis/.github/actions/build-stack composite action checks out all
# three repos side by side and builds the linked packages first (their exports
# point at dist/). CI tracks each sibling's default-branch HEAD (use-lock false)
# so we get latest-against-latest integration signal.
#
# CI now runs the vitest unit suite in addition to typecheck + build. The
# Playwright e2e suite (38 runs, viewport-sensitive) stays LOCAL — it's too
# expensive for every push.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: typecheck, test & build
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: 1 # web check/test/build doesn't need the Electron binary
    steps:
      - uses: actions/checkout@v4
        with:
          path: Axis
      - name: Build sibling stack (codec + server)
        uses: ./Axis/.github/actions/build-stack
        with:
          use-lock: 'false'
      - name: Axis typecheck, unit test + build
        working-directory: Axis
        run: |
          npm ci
          npx svelte-kit sync
          npx svelte-check --tsconfig ./tsconfig.json
          npm test
          npm run build
