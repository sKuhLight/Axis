name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: typecheck & build
    runs-on: ubuntu-latest
    # run inside a Node container so the only action is checkout@v5 (Node 24) —
    # avoids the setup-node / Node 20 deprecation entirely.
    container: node:22
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: 1 # web check/build doesn't need the Electron binary
    steps:
      - uses: actions/checkout@v5
      - run: npm ci
      - run: npx svelte-kit sync   # generates .svelte-kit/tsconfig.json for svelte-check
      - run: npx svelte-check --tsconfig ./tsconfig.json
      - run: npm run build
