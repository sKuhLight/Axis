name: deploy-remote

# Deploys the RELEASED Axis stack to axisapp.live. Since the pipeline rework the site is a
# RELEASE CHANNEL: it serves the last PUBLISHED Axis release, built at that release's tag with the
# pinned sibling stack (use-lock 'true') — NOT default-branch HEAD. It builds the remote web app
# (VITE_AXIS_REMOTE=1) and pushes it into sKuhLight/axis-website, whose Cloudflare Worker
# auto-deploys on push. The SPA lands at the site root (index.html + _app/**); the landing
# (welcome.html) and legal pages stay untouched.
#
# Rollback: re-run via workflow_dispatch with an earlier release tag in `ref` — the site rebuilds
# from that tag's checkout + stack.lock.json pins.
#
# One-time setup in the Axis repo (Settings → Secrets and variables → Actions):
#   • Variables: VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY  (publishable anon key — safe to expose)
#   • Secret:    AXIS_WEBSITE_TOKEN  (a token with contents:write on sKuhLight/axis-website)
# The `gate` job below skips the deploy (never fails) until all three are present.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Axis release tag to deploy (e.g. v0.9.24-beta). Empty = latest published release.'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: deploy-remote
  cancel-in-progress: true

jobs:
  # Cheap pre-check: is the deploy fully configured? Skips the real job (no red X) until it is.
  gate:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          TOKEN: ${{ secrets.AXIS_WEBSITE_TOKEN }}
          SB_URL: ${{ vars.VITE_SUPABASE_URL }}
          SB_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -n "$TOKEN" ] && [ -n "$SB_URL" ] && [ -n "$SB_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "deploy-remote not configured (needs AXIS_WEBSITE_TOKEN + VITE_SUPABASE_URL + VITE_SUPABASE_ANON_KEY) — skipping."
          fi

  deploy:
    needs: gate
    if: needs.gate.outputs.ready == 'true'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      # Which release to deploy: the published release's tag, else the workflow_dispatch input,
      # else the latest published release resolved via gh.
      - name: Resolve release tag
        id: rel
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_REF: ${{ github.event.inputs.ref }}
        run: |
          set -euo pipefail
          REF="$RELEASE_TAG"
          if [ -z "$REF" ]; then REF="$INPUT_REF"; fi
          if [ -z "$REF" ]; then
            # `release view --latest` excludes prereleases, but Axis ships -beta — list instead.
            REF="$(gh release list --repo "$GITHUB_REPOSITORY" --exclude-drafts --limit 1 --json tagName --jq '.[0].tagName // empty')"
          fi
          if [ -z "$REF" ]; then
            echo "::error::could not resolve a release tag to deploy."; exit 1
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Deploying Axis release: $REF" | tee -a "$GITHUB_STEP_SUMMARY"

      # Sibling layout for the file: workspace links (forgefx-server → forgefx-midi) — the Browser
      # Direct runtime is bundled from these packages. Check out Axis at the RELEASE TAG; the
      # composite action then pins the siblings from that tag's stack.lock.json (use-lock 'true').
      - name: Checkout Axis at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.rel.outputs.ref }}
          path: Axis
      - name: Build sibling stack (codec + server, pinned)
        uses: ./Axis/.github/actions/build-stack
        with:
          use-lock: 'true'

      - name: Install Axis deps
        working-directory: Axis
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Build web SPA (remote + direct modes)
        working-directory: Axis
        run: npm run build
        env:
          VITE_AXIS_REMOTE: '1'
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}

      - name: Checkout axis-website
        uses: actions/checkout@v4
        with:
          repository: sKuhLight/axis-website
          token: ${{ secrets.AXIS_WEBSITE_TOKEN }}
          path: axis-website

      - name: Sync SPA into axis-website/public (preserve landing + legal pages)
        run: |
          rm -rf axis-website/public/_app
          cp -r Axis/build/_app axis-website/public/_app
          # copy the SPA shell + ALL top-level build files (index.html, manifest.webmanifest,
          # service-worker.js, icons, favicon) so the PWA assets reach axisapp.live. The hand-maintained
          # landing/legal pages live only in axis-website (not in build/), so cp preserves them.
          find Axis/build -maxdepth 1 -type f -exec cp {} axis-website/public/ \;

      - name: Commit & push (triggers Cloudflare auto-deploy)
        run: |
          cd axis-website
          git config user.name "axis-deploy"
          git config user.email "deploy@axisapp.live"
          git add -A public
          if git diff --cached --quiet; then echo "no changes to deploy"; exit 0; fi
          git commit -m "deploy: axis remote web app"
          git push
