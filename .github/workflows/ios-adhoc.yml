name: ios-adhoc

# Build an ad-hoc-signed iOS IPA on a macOS runner and upload it as a workflow artifact for sideload
# testing (no Mac needed locally). Trigger manually, or by pushing an `ios-v*` tag.
#
# Required repository secrets:
#   IOS_CERTIFICATE_P12_BASE64     - base64 of your Apple distribution/development .p12
#   IOS_CERTIFICATE_PASSWORD       - password for that .p12
#   IOS_PROVISIONING_PROFILE_BASE64- base64 of an ad-hoc .mobileprovision containing the test UDIDs,
#                                    for app id live.axisapp.axis
#   APPLE_TEAM_ID                  - 10-char Apple Team ID
#   SUPABASE_URL / SUPABASE_ANON_KEY - baked into the web bundle for cloud sync + Axis Remote
on:
  workflow_dispatch:
  push:
    tags: ['ios-v*']

permissions:
  contents: read

jobs:
  ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: Axis
    steps:
      - name: Checkout Axis
        uses: actions/checkout@v4
        with:
          path: Axis
      - name: Checkout ForgeFX (runtime engine)
        uses: actions/checkout@v4
        with:
          repository: sKuhLight/ForgeFX
          path: ForgeFX
      - name: Checkout forgefx-midi (codec package)
        uses: actions/checkout@v4
        with:
          repository: sKuhLight/forgefx-midi
          path: forgefx-midi
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Same build order as the desktop release: codec → server (its exports point at dist/) → UI.
      # Unlike the Electron build, no symlink de-vendoring is needed — Vite inlines forgefx-server
      # into the web bundle, and cap sync just copies build/ into the native project.
      - name: Build forgefx-midi (codec)
        working-directory: forgefx-midi
        run: |
          npm ci
          npm run build
      - name: Build ForgeFX server (runtime)
        working-directory: ForgeFX/server
        run: |
          npm ci
          npm run build
      - name: Install Axis
        run: npm ci

      - name: Build mobile web bundle + sync iOS
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          npm run build:mobile
          npx cap sync ios

      # --- Signing: import the cert into a temporary keychain + install the provisioning profile ---
      - name: Import signing assets
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"

          echo "$IOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PW" "$KEYCHAIN_PATH" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Install the profile where Xcode looks for it.
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          cp "$PROFILE_PATH" "$PROFILES_DIR/"

          # Extract the profile name/uuid and the signing identity for the export step.
          security cms -D -i "$PROFILE_PATH" > "$RUNNER_TEMP/profile.plist"
          PROFILE_NAME="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$RUNNER_TEMP/profile.plist")"
          SIGN_ID="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -m1 -o '"[^"]*"' | tr -d '"')"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME"   >> "$GITHUB_ENV"
          echo "SIGN_ID=$SIGN_ID"             >> "$GITHUB_ENV"
          echo "Profile: $PROFILE_NAME | Identity: $SIGN_ID"

      - name: Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcodebuild -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CODE_SIGN_IDENTITY="$SIGN_ID" \
            MARKETING_VERSION=0.8.0 \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            | xcpretty || true
          test -d "$RUNNER_TEMP/App.xcarchive"

      - name: Export IPA (ad-hoc)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>ad-hoc</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key><string>manual</string>
            <key>stripSwiftSymbols</key><true/>
            <key>compileBitcode</key><false/>
            <key>provisioningProfiles</key>
            <dict>
              <key>live.axisapp.axis</key><string>${PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"
          ls -la "$RUNNER_TEMP/export"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: axis-ios-adhoc
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: error
