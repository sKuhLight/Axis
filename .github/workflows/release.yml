name: release

# Tag a version (e.g. v0.8.8-beta) to build the bundled Axis + ForgeFX desktop app for
# Windows, macOS, and Linux and attach the installers to a GitHub release.
#
# Four jobs run in order:
#   gate    — full test gate (unit + check) against the PINNED sibling stack (stack.lock.json).
#   draft   — creates the release ONCE as a DRAFT, with a "Shipped stack" footer (the exact
#             codec/server SHAs the gate built) + GitHub auto-notes, and a release-manifest.json.
#   desktop — matrix build; each OS uploads its installers to the existing draft (files only,
#             never touching the name/body).
#   validate-and-publish — asserts the full installer inventory, then auto-publishes the draft
#             (publishing arms electron-updater's latest*.yml auto-update feed). It publishes with
#             the PAT so the release:published event fires deploy-remote (axisapp.live) — the
#             built-in GITHUB_TOKEN would start no workflow.
#
# Any failure (or an incomplete matrix) leaves the release a DRAFT. (draft-first fixes the old
# race where three matrix jobs each created/published the release, sometimes before any installer
# existed.)
#
# Release builds PIN the siblings via stack.lock.json (use-lock 'true') so an installer is
# reproducible; bump those refs as part of the release checklist (see docs/RELEASING.md).
on:
  push:
    tags: ['v*']

permissions:
  contents: write

# Serialize per tag so a re-run/duplicate push can't race the draft, manifest, or publish steps.
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  gate:
    name: test gate (unit + build)
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: 1 # gate only checks/tests — no Electron binary needed
    outputs:
      forgefx-ref: ${{ steps.stack.outputs.forgefx-ref }}
      midi-ref: ${{ steps.stack.outputs.midi-ref }}
      forgefx-sha: ${{ steps.stack.outputs.forgefx-sha }}
      midi-sha: ${{ steps.stack.outputs.midi-sha }}
    steps:
      - name: Checkout Axis
        uses: actions/checkout@v4
        with:
          path: Axis
      - name: Build sibling stack (codec + server, pinned)
        id: stack
        uses: ./Axis/.github/actions/build-stack
        with:
          use-lock: 'true'
      - name: Axis check + unit tests
        working-directory: Axis
        run: |
          npm ci
          npm run check
          npm test

  draft:
    name: create draft release
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Axis
        uses: actions/checkout@v4
        with:
          path: Axis
      # The release body is now just the "Shipped stack" footer stamping the exact codec + server
      # SHAs the gate built; softprops' generate_release_notes:true PRE-PENDS this body to GitHub's
      # auto-generated "What's Changed" (PRs since the last release, categorized by .github/release.yml).
      # CHANGELOG.md is no longer read or written — the GitHub releases page is canonical.
      - name: Assemble release footer
        shell: bash
        env:
          FORGEFX_SHA: ${{ needs.gate.outputs.forgefx-sha }}
          MIDI_SHA: ${{ needs.gate.outputs.midi-sha }}
        run: |
          {
            echo "**Axis $GITHUB_REF_NAME** — community beta. A standalone editor for Fractal devices that bundles the ForgeFX engine — one install, no setup."
            echo
            echo "### Shipped stack"
            echo
            echo "- Axis: \`$GITHUB_REF_NAME\`"
            echo "- ForgeFX: \`${FORGEFX_SHA:-default branch HEAD}\`"
            echo "- forgefx-midi: \`${MIDI_SHA:-default branch HEAD}\`"
            echo
            echo "---"
            echo "Independent, third-party software. Not affiliated with Fractal Audio Systems. Use at your own risk — see DISCLAIMER.md. Always back up your presets."
          } > release-notes.md
          cat release-notes.md
      # Machine-readable manifest of this release: channel, correlation id, the BOTH pinned upstream
      # refs it was built against (from stack.lock.json), and the expected installer inventory.
      # Uploaded as a release asset alongside the installers.
      - name: Build release manifest
        shell: bash
        run: |
          set -euo pipefail
          V="${GITHUB_REF_NAME#v}"
          jq -n \
            --arg repo "sKuhLight/Axis" \
            --arg version "$V" \
            --arg tag "$GITHUB_REF_NAME" \
            --arg commit "$GITHUB_SHA" \
            --arg chainId "Axis@$GITHUB_REF_NAME" \
            --arg created "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --slurpfile lock Axis/stack.lock.json \
            '{
              schemaVersion: 1,
              repository: $repo,
              version: $version,
              tag: $tag,
              commit: $commit,
              channel: "beta",
              chainId: $chainId,
              upstream: {
                ForgeFX: { repo: $lock[0].ForgeFX.repo, ref: $lock[0].ForgeFX.ref },
                "forgefx-midi": { repo: $lock[0]["forgefx-midi"].repo, ref: $lock[0]["forgefx-midi"].ref }
              },
              artifacts: [
                "latest.yml", "latest-mac.yml", "latest-linux.yml",
                "*.AppImage", "*.deb", "*.pacman", "*.rpm",
                "*.dmg", "*.dmg.blockmap", "*-mac.zip",
                "*.exe", "*.exe.blockmap", "*-win.zip"
              ],
              createdAt: $created
            }' > release-manifest.json
          cat release-manifest.json
      # Create the release exactly ONCE, as a draft. The desktop matrix below only uploads
      # installers to it — so name/body are set here and never clobbered by a matrix job.
      # generate_release_notes:true → GitHub auto-notes appended after the footer body above.
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: Axis ${{ github.ref_name }}
          body_path: release-notes.md
          generate_release_notes: true
          files: release-manifest.json

  desktop:
    name: desktop (${{ matrix.os }})
    needs: draft
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Axis
        uses: actions/checkout@v4
        with:
          path: Axis
      # Versions come from the tag now (version-guard is gone), so inject it into package.json
      # BEFORE the UI build + packaging: vite reads pkg.version for __APP_VERSION__ and
      # electron-builder reads package.json for the installer/artifact version.
      - name: Inject version from tag
        working-directory: Axis
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#v}"
          npm version "$V" --no-git-tag-version --allow-same-version
      - name: Build sibling stack (codec + server, pinned)
        uses: ./Axis/.github/actions/build-stack
        with:
          use-lock: 'true'
          build-server: 'true'

      # electron-builder must ship real files, but npm links forgefx-midi as a SYMLINK pointing
      # outside the bundle. After keeping only production deps, replace the symlink with a plain
      # copy (dist + catalog + package.json; the codec has zero runtime deps).
      - name: De-vendor forgefx-midi for packaging
        working-directory: ForgeFX/server
        shell: bash
        run: |
          npm prune --omit=dev
          rm -rf node_modules/forgefx-midi
          mkdir -p node_modules/forgefx-midi
          cp -R ../../forgefx-midi/package.json ../../forgefx-midi/dist ../../forgefx-midi/catalog node_modules/forgefx-midi/

      # Inject the production env (Supabase + telemetry) into the bundled server. index.ts loads
      # server/.env relative to itself; electron-builder bundles it (see extraResources filter).
      # Keys are publishable (client-safe); they live in CI secrets, never in source.
      - name: Inject ForgeFX production env
        working-directory: ForgeFX/server
        shell: bash
        run: |
          {
            echo "AXIS_CLOUD=1"
            echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}"
            echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}"
            echo "AXIS_TELEMETRY=1"
            echo "AXIS_FARO_URL=${{ secrets.AXIS_FARO_URL }}"
          } > .env

      # Install Axis (incl. Electron) and build the static UI pointed at the local engine.
      - name: Install Axis
        working-directory: Axis
        run: npm ci
      - name: Build Axis UI
        working-directory: Axis
        env:
          VITE_FORGEFX_BASE: '' # same-origin: the UI is served by ForgeFX, so it finds the API on whatever port it bound
          # macOS arm64 runners have 7 GB RAM, so Node caps its heap at ~2 GB — not enough for
          # Rollup's chunk-rendering pass (OOM'd v0.9.0-beta). Linux/Windows runners have 16 GB
          # and never hit this; 4 GB fits every runner in the matrix.
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build

      # No native rebuild: serialport is N-API and ships a universal darwin-x64+arm64 prebuild
      # (plus win/linux prebuilds), so the bundled binary loads on every target arch as-is.
      # Rebuilding here would compile a host-arch build/Release that shadows the prebuild and
      # break the cross-arch (x64) macOS build.

      - name: Install Linux packaging tools (pacman needs bsdtar; rpm needs rpmbuild)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools rpm

      - name: Package desktop app
        working-directory: Axis
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish never

      # Attach this OS's installers to the DRAFT release created by the `draft` job. Files only:
      # NO name/body here or a matrix job would overwrite the draft's assembled notes.
      - name: Upload installers to the draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            Axis/dist-desktop/*.AppImage
            Axis/dist-desktop/*.deb
            Axis/dist-desktop/*.pacman
            Axis/dist-desktop/*.rpm
            Axis/dist-desktop/*.dmg
            Axis/dist-desktop/*.zip
            Axis/dist-desktop/*.exe
            Axis/dist-desktop/*.blockmap
            Axis/dist-desktop/latest*.yml

  # Final gate: the draft is only published once the full 3-OS installer inventory is present.
  # Publishing a draft is what arms electron-updater's latest*.yml auto-update feed — so an
  # incomplete matrix must NEVER publish. desktop is a matrix (fail-fast:false), so `needs` waits
  # for every leg; a failed leg fails the job → we run unless the whole workflow was cancelled
  # (`if: ${{ !cancelled() }}`) and inspect the results explicitly, so a manual cancel files no
  # spurious release-failure issue. Draft stays on any failure; re-running the failed desktop leg
  # re-runs this job.
  validate-and-publish:
    name: validate + publish
    needs: [draft, desktop]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
      # No checkout in this job — gh has no git context to infer the repo from.
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Emergency stop
        id: estop
        run: |
          if [ "${{ vars.RELEASE_AUTOMATION_ENABLED }}" = "false" ]; then
            echo "::notice::RELEASE_AUTOMATION_ENABLED=false — leaving ${GITHUB_REF_NAME} as a draft."
            echo "- publish halted (RELEASE_AUTOMATION_ENABLED=false)" >> "$GITHUB_STEP_SUMMARY"
            echo "halt=true" >> "$GITHUB_OUTPUT"
          else
            echo "halt=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Require draft success
        if: steps.estop.outputs.halt != 'true' && needs.draft.result != 'success'
        run: |
          echo "::error::draft job did not succeed (${{ needs.draft.result }}) — nothing to validate/publish."
          exit 1
      - name: Guard incomplete matrix
        if: steps.estop.outputs.halt != 'true' && needs.desktop.result != 'success'
        run: |
          echo "::error::incomplete matrix — desktop result is '${{ needs.desktop.result }}'. Leaving the release a DRAFT."
          exit 1
      - name: Validate asset inventory
        if: steps.estop.outputs.halt != 'true'
        run: |
          set -euo pipefail
          ASSETS="$(gh release view "$GITHUB_REF_NAME" --json assets --jq '.assets[].name')"
          echo "Release assets:"; echo "$ASSETS"
          fail=0
          require_file() {
            if ! echo "$ASSETS" | grep -qxF "$1"; then
              echo "::error::missing required asset: $1"; fail=1
            fi
          }
          require_count() {
            # $1 = extended-regex, $2 = min count, $3 = human label
            n="$(echo "$ASSETS" | grep -Ec -e "$1" || true)"
            if [ "$n" -lt "$2" ]; then
              echo "::error::expected >= $2 $3, found $n"; fail=1
            fi
          }
          require_file latest.yml
          require_file latest-mac.yml
          require_file latest-linux.yml
          require_count '\.AppImage$' 1 "AppImage"
          require_count '\.deb$' 1 "deb"
          require_count '\.pacman$' 1 "pacman"
          require_count '\.rpm$' 1 "rpm"
          require_count '\.dmg$' 2 "dmg (x64 + arm64)"
          require_count '\.dmg\.blockmap$' 2 "dmg blockmap"
          require_count '-mac\.zip$' 2 "mac zip (x64 + arm64)"
          require_count '\.exe$' 1 "exe"
          require_count '\.exe\.blockmap$' 1 "exe blockmap"
          require_count '-win\.zip$' 1 "win zip"
          if [ "$fail" -ne 0 ]; then
            echo "::error::installer inventory incomplete — leaving the release a DRAFT."
            exit 1
          fi
          echo "- installer inventory complete" >> "$GITHUB_STEP_SUMMARY"
      # Publish with the PAT so the release:published event fires deploy-remote (axisapp.live);
      # a GITHUB_TOKEN-triggered event would start no workflow. Overrides the job-level GH_TOKEN.
      - name: Publish release
        if: steps.estop.outputs.halt != 'true'
        env:
          GH_TOKEN: ${{ secrets.STACK_DISPATCH_TOKEN || github.token }}
        run: |
          set -euo pipefail
          gh release edit "$GITHUB_REF_NAME" --draft=false
          echo "- published ${GITHUB_REF_NAME} (electron-updater armed)" >> "$GITHUB_STEP_SUMMARY"
      - name: Report failure
        if: failure()
        env:
          CHAIN_ID: Axis@${{ github.ref_name }}
          DRAFT_RESULT: ${{ needs.draft.result }}
          DESKTOP_RESULT: ${{ needs.desktop.result }}
        run: |
          set -euo pipefail
          REASON="release validation failed"
          if [ "$DRAFT_RESULT" != "success" ]; then
            REASON="draft job did not succeed ($DRAFT_RESULT)"
          elif [ "$DESKTOP_RESULT" != "success" ]; then
            REASON="incomplete matrix (desktop result: $DESKTOP_RESULT)"
          fi
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          BODY="Release chain failure in \`${GITHUB_REPOSITORY}\` — chain \`${CHAIN_ID}\`.
          Stage: validate-and-publish. Reason: ${REASON}.
          The release \`${GITHUB_REF_NAME}\` stays a DRAFT (not published; auto-update not armed).
          Run: ${RUN_URL}"
          EXISTING="$(gh issue list --label release-failure --state open --search "$CHAIN_ID" --json number --jq '.[0].number // empty' || true)"
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create --title "release chain failure: ${GITHUB_REPOSITORY} ${CHAIN_ID}" --label release-failure --body "$BODY"
          fi
